<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐍 Retro Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
  }

  #score-bar {
    color: #33ff66;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(51,255,102,.5);
  }

  #game-canvas {
    border: 2px solid #33ff66;
    box-shadow: 0 0 20px rgba(51,255,102,.2);
    border-radius: 4px;
  }

  #message {
    color: #33ff66;
    font-size: 16px;
    margin-top: 14px;
    text-align: center;
    letter-spacing: 1px;
    min-height: 24px;
    opacity: 0.8;
  }

  /* Swipe area covers the whole canvas for touch */
  #touch-area {
    position: relative;
  }
</style>
</head>
<body>

<div id="score-bar">SCORE: 0</div>
<div id="touch-area">
  <canvas id="game-canvas"></canvas>
</div>
<div id="message">Swipe to start 🐍</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const scoreBar = document.getElementById('score-bar');
const messageEl = document.getElementById('message');

// Grid settings
const COLS = 19;
const ROWS = 24;
let CELL = 16;

// Resize canvas to fit screen while keeping grid aspect ratio
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 24, 380);
  const maxH = window.innerHeight - 140;
  // Maintain the COLS:ROWS ratio
  const ratio = COLS / ROWS;
  let w = maxW;
  let h = w / ratio;
  if (h > maxH) {
    h = maxH;
    w = h * ratio;
  }
  CELL = Math.floor(w / COLS);
  w = CELL * COLS;
  h = CELL * ROWS;
  canvas.width = w;
  canvas.height = h;
  draw();
}

window.addEventListener('resize', resizeCanvas);

// Game state
let snake, dir, nextDir, food, score, gameOver, started, speed, loop;

function initGame() {
  const startX = Math.floor(COLS / 2);
  const startY = Math.floor(ROWS / 2);
  snake = [
    { x: startX, y: startY },
    { x: startX - 1, y: startY },
    { x: startX - 2, y: startY }
  ];
  dir = { x: 0, y: 0 };
  nextDir = { x: 0, y: 0 };
  food = spawnFood();
  score = 0;
  gameOver = false;
  started = false;
  speed = 135;
  updateScore();
  draw();
}

function spawnFood() {
  let f;
  do {
    f = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === f.x && s.y === f.y));
  return f;
}

function updateScore() {
  scoreBar.textContent = 'SCORE: ' + score;
}

function draw() {
  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  ctx.strokeStyle = 'rgba(51,255,102,.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, canvas.height);
    ctx.stroke();
  }
  for (let j = 0; j <= ROWS; j++) {
    ctx.beginPath();
    ctx.moveTo(0, j * CELL);
    ctx.lineTo(canvas.width, j * CELL);
    ctx.stroke();
  }

  // Food — pulsing red
  const pulse = Math.sin(Date.now() / 200) * 0.15 + 0.85;
  ctx.fillStyle = `rgba(255,60,60,${pulse})`;
  ctx.shadowColor = '#ff3c3c';
  ctx.shadowBlur = 12;
  roundRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4, 4);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  for (let i = 0; i < snake.length; i++) {
    const seg = snake[i];
    const brightness = i === 0 ? 1 : Math.max(0.35, 1 - i * 0.03);
    ctx.fillStyle = `rgba(51,255,102,${brightness})`;
    if (i === 0) {
      ctx.shadowColor = '#33ff66';
      ctx.shadowBlur = 10;
    }
    roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 4);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function update() {
  if (!started || gameOver) return;

  dir = { ...nextDir };

  const head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame();
    return;
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  // Eat food
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    food = spawnFood();
    // Speed up slightly every 5 foods
    if (score % 50 === 0 && speed > 60) {
      speed -= 8;
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }
  } else {
    snake.pop();
  }

  draw();
}

function tick() {
  update();
}

function endGame() {
  gameOver = true;
  clearInterval(loop);
  messageEl.innerHTML = '💀 GAME OVER — Score: ' + score + '<br>Tap to play again';
  // Flash effect
  ctx.fillStyle = 'rgba(255,60,60,.3)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  draw();
}

function startGame(direction) {
  if (gameOver) {
    initGame();
  }
  if (!started) {
    started = true;
    nextDir = direction;
    dir = direction;
    messageEl.textContent = '';
    loop = setInterval(tick, speed);
  }
}

// Direction helpers — prevent reversing
function setDirection(dx, dy) {
  if (dx === -dir.x && dy === -dir.y) return; // can't reverse
  nextDir = { x: dx, y: dy };
}

// Touch controls
let touchStartX = 0, touchStartY = 0;
const SWIPE_MIN = 20;

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;

  if (Math.abs(dx) < SWIPE_MIN && Math.abs(dy) < SWIPE_MIN) return;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) { setDirection(1, 0); startGame({x:1,y:0}); }
    else        { setDirection(-1, 0); startGame({x:-1,y:0}); }
  } else {
    if (dy > 0) { setDirection(0, 1); startGame({x:0,y:1}); }
    else        { setDirection(0, -1); startGame({x:0,y:-1}); }
  }

  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: false });

// Tap to restart after game over
canvas.addEventListener('touchend', function(e) {
  if (gameOver) {
    initGame();
  }
}, { passive: false });

// Keyboard fallback (desktop testing)
document.addEventListener('keydown', function(e) {
  switch (e.key) {
    case 'ArrowUp':    setDirection(0,-1); startGame({x:0,y:-1}); break;
    case 'ArrowDown':  setDirection(0, 1); startGame({x:0,y:1}); break;
    case 'ArrowLeft':  setDirection(-1,0); startGame({x:-1,y:0}); break;
    case 'ArrowRight': setDirection(1, 0); startGame({x:1,y:0}); break;
    case ' ':          if (gameOver) initGame(); break;
  }
});

// Init
resizeCanvas();
initGame();

// Animate food pulse even when idle
setInterval(() => { if (!started || gameOver) draw(); }, 80);
</script>

</body>
</html>

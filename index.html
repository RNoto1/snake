<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐍 Deadpool Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    touch-action: none;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #score-bar {
    color: #d0372a;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(208,55,42,.5);
  }
  #game-canvas {
    border: 2px solid #d0372a;
    box-shadow: 0 0 20px rgba(208,55,42,.2);
    border-radius: 4px;
    touch-action: none;
    display: block;
  }
  #message {
    color: #f0c040;
    font-size: 16px;
    margin-top: 14px;
    text-align: center;
    letter-spacing: 1px;
    min-height: 24px;
  }
</style>
</head>
<body>

<div id="score-bar">SCORE: 0</div>
<canvas id="game-canvas"></canvas>
<div id="message">Swipe anywhere to start 🐍</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const scoreBar = document.getElementById('score-bar');
const messageEl = document.getElementById('message');

const COLS = 19;
const ROWS = 24;
let CELL = 16;

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 24, 380);
  const maxH = window.innerHeight - 140;
  const ratio = COLS / ROWS;
  let w = maxW;
  let h = w / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  CELL = Math.max(8, Math.floor(w / COLS));
  w = CELL * COLS;
  h = CELL * ROWS;
  canvas.width = w;
  canvas.height = h;
  draw();
}
window.addEventListener('resize', resizeCanvas);

let snake, dir, nextDir, food, score, gameOver, started, speed, loop;

function initGame() {
  const sx = Math.floor(COLS / 2);
  const sy = Math.floor(ROWS / 2);
  snake = [
    { x: sx, y: sy },
    { x: sx - 1, y: sy },
    { x: sx - 2, y: sy }
  ];
  dir = { x: 0, y: 0 };
  nextDir = { x: 0, y: 0 };
  food = spawnFood();
  score = 0;
  gameOver = false;
  started = false;
  speed = 135;
  updateScore();
  showMessage("Swipe anywhere to start 🐍");
  draw();
}

function spawnFood() {
  let f;
  do {
    f = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === f.x && s.y === f.y));
  return f;
}

function updateScore() {
  scoreBar.textContent = 'SCORE: ' + score;
}

function showMessage(text) {
  messageEl.innerHTML = text;
}

function clearMessage() {
  messageEl.innerHTML = '&nbsp;';
}

function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = 'rgba(208,55,42,.05)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, canvas.height);
    ctx.stroke();
  }
  for (let j = 0; j <= ROWS; j++) {
    ctx.beginPath();
    ctx.moveTo(0, j * CELL);
    ctx.lineTo(canvas.width, j * CELL);
    ctx.stroke();
  }

  drawWolverineMask(food.x * CELL, food.y * CELL);

  for (let i = 0; i < snake.length; i++) {
    const seg = snake[i];

    if (i === 0) {
      ctx.fillStyle = '#d0372a';
      ctx.shadowColor = '#ff4030';
      ctx.shadowBlur = 12;
      roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 4);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#fff';
      const es = Math.max(1, CELL * 0.13);
      let ex1, ey1, ex2, ey2;
      if (dir.x === 1 || (dir.x === 0 && dir.y === 0)) {
        ex1 = seg.x * CELL + CELL*0.65; ey1 = seg.y * CELL + CELL*0.3;
        ex2 = seg.x * CELL + CELL*0.65; ey2 = seg.y * CELL + CELL*0.6;
      } else if (dir.x === -1) {
        ex1 = seg.x * CELL + CELL*0.25; ey1 = seg.y * CELL + CELL*0.3;
        ex2 = seg.x * CELL + CELL*0.25; ey2 = seg.y * CELL + CELL*0.6;
      } else if (dir.y === -1) {
        ex1 = seg.x * CELL + CELL*0.25; ey1 = seg.y * CELL + CELL*0.2;
        ex2 = seg.x * CELL + CELL*0.6;  ey2 = seg.y * CELL + CELL*0.2;
      } else {
        ex1 = seg.x * CELL + CELL*0.25; ey1 = seg.y * CELL + CELL*0.65;
        ex2 = seg.x * CELL + CELL*0.6;  ey2 = seg.y * CELL + CELL*0.65;
      }
      ctx.fillRect(ex1, ey1, es, es);
      ctx.fillRect(ex2, ey2, es, es);
    } else {
      ctx.fillStyle = (i % 2 === 0) ? '#b03020' : '#1a1a2a';
      roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 4);
      ctx.fill();
    }
  }
}

function drawWolverineMask(px, py) {
  const s = CELL;
  const cx = px + s / 2;
  const cy = py + s / 2;
  const pulse = Math.sin(Date.now() / 200) * 0.15 + 0.85;

  ctx.fillStyle = 'rgba(240,192,64,' + pulse + ')';
  ctx.shadowColor = '#f0c040';
  ctx.shadowBlur = 10;
  roundRect(px + s*0.1, py + s*0.2, s*0.8, s*0.65, 2);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(px + s*0.15, py + s*0.2);
  ctx.lineTo(px + s*0.3, py + s*0.2);
  ctx.lineTo(px + s*0.22, py + s*0.02);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(px + s*0.7, py + s*0.2);
  ctx.lineTo(px + s*0.85, py + s*0.2);
  ctx.lineTo(px + s*0.78, py + s*0.02);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;

  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.ellipse(px + s*0.32, cy + s*0.05, s*0.12, s*0.06, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(px + s*0.68, cy + s*0.05, s*0.12, s*0.06, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + s*0.18, s*0.05, s*0.08, 0, 0, Math.PI*2);
  ctx.fill();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function update() {
  if (!started || gameOver) return;
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }
  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    food = spawnFood();
    if (score % 50 === 0 && speed > 60) {
      speed -= 8;
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }
  } else {
    snake.pop();
  }
  draw();
}

function tick() { update(); }

function endGame() {
  gameOver = true;
  clearInterval(loop);
  showMessage('💀 GAME OVER — Score: ' + score + '<br>Tap to play again');
  draw();
  ctx.fillStyle = 'rgba(208,55,42,.25)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ── Unified direction handler ─────────────────────────────────────────────────
function beginMove(dx, dy) {
  if (gameOver) { initGame(); return; }
  if (!started) {
    started = true;
    dir = { x: dx, y: dy };
    nextDir = { x: dx, y: dy };
    clearMessage();
    loop = setInterval(tick, speed);
  } else {
    if (dx === -dir.x && dy === -dir.y) return; // no reversing
    nextDir = { x: dx, y: dy };
  }
}

// ── TOUCH EVENTS — reliable on Android ───────────────────────────────────────
const SWIPE_MIN = 15;
let touchStartX = 0, touchStartY = 0, touchMoved = false;

document.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const t = e.changedTouches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchMoved = false;
}, { passive: false });

document.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (touchMoved) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (Math.abs(dx) < SWIPE_MIN && Math.abs(dy) < SWIPE_MIN) return;
  touchMoved = true;
  if (Math.abs(dx) > Math.abs(dy)) {
    beginMove(dx > 0 ? 1 : -1, 0);
  } else {
    beginMove(0, dy > 0 ? 1 : -1);
  }
}, { passive: false });

document.addEventListener('touchend', function(e) {
  e.preventDefault();
  // Tap to restart when game over and no swipe detected
  if (!touchMoved && gameOver) { initGame(); }
}, { passive: false });

// ── KEYBOARD fallback (desktop) ───────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  switch (e.key) {
    case 'ArrowUp':    e.preventDefault(); beginMove(0, -1); break;
    case 'ArrowDown':  e.preventDefault(); beginMove(0,  1); break;
    case 'ArrowLeft':  e.preventDefault(); beginMove(-1, 0); break;
    case 'ArrowRight': e.preventDefault(); beginMove(1,  0); break;
    case ' ':          if (gameOver) initGame(); break;
  }
});

// Init
resizeCanvas();
initGame();

// Animate food pulse when idle
setInterval(function() {
  if (!started || gameOver) draw();
}, 80);
</script>
</body>
</html>
